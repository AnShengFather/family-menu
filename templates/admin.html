<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon-192.svg">
<title>菜单管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f4f4;--card:#fff;--p:#5b8a72;--ph:#4d7a63;--pl:rgba(91,138,114,0.08);--t:#1a1a1a;--t2:#666;--t3:#999;--l:#e5e5e5;--r:12px;--rs:8px;--s:0 1px 6px rgba(0,0,0,0.06)}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;padding:16px;min-height:100vh}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:20px;margin-bottom:2px}
.bk{font-size:13px;color:var(--t3);text-decoration:none;display:inline-block}
.bk:hover{color:var(--p)}

.lb{background:var(--card);border-radius:var(--r);padding:32px 20px;text-align:center;box-shadow:var(--s);max-width:320px;margin:60px auto}
.lb p{margin-bottom:12px;font-size:15px;color:var(--t2)}
.lb input{padding:10px 14px;border:1px solid var(--l);border-radius:var(--rs);font-size:15px;width:100%;max-width:200px;outline:none}
.lb input:focus{border-color:var(--p)}
.lb button{background:var(--p);color:#fff;border:none;border-radius:var(--rs);padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}

.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--s)}
.card h2{font-size:14px;color:var(--t2);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.fr input,.fr select,.fr textarea{padding:8px 10px;border:1px solid var(--l);border-radius:var(--rs);font-size:13px;outline:none;flex:1;min-width:80px}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--p)}
.fr textarea{flex-basis:100%;resize:vertical;min-height:44px}
.fr button{background:var(--p);color:#fff;border:none;border-radius:var(--rs);padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600}
.fr button.sec{background:#eee;color:var(--t2)}

.cf{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;position:sticky;top:0;z-index:50;background:var(--card)}
.cf::-webkit-scrollbar{display:none}
.cf .fi{flex-shrink:0;padding:6px 18px;border-radius:20px;font-size:13px;background:var(--bg);border:1px solid var(--l);cursor:pointer;color:var(--t2);white-space:nowrap;transition:0.15s}
.cf .fi:hover{border-color:var(--p);color:var(--p)}
.cf .fi.on{background:var(--p);border-color:var(--p);color:#fff}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:8px 6px;border-bottom:1px solid var(--l);text-align:left;vertical-align:middle}
.tbl th{font-weight:600;color:var(--t3);font-size:11px;letter-spacing:0.5px}
.tbl .tag{font-size:11px;background:var(--pl);color:var(--p);padding:1px 8px;border-radius:4px;white-space:nowrap}
.tbl .on{color:#2a7;font-weight:500}
.tbl .off{color:#c44}
.ac{border:1px solid var(--l);border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px;background:var(--card);transition:0.15s;margin-right:2px;white-space:nowrap}
.ac:hover{border-color:var(--p);color:var(--p)}
.ac.del:hover{border-color:#c44;color:#c44}

/* 食材管理 */
.ing-list{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.ing-list .it{background:var(--bg);padding:2px 8px;border-radius:4px;font-size:12px}
.ing-list .it .rm{color:#c44;cursor:pointer;margin-left:4px;font-size:10px}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-30px);background:rgba(0,0,0,0.85);color:#fff;padding:7px 18px;border-radius:6px;font-size:13px;opacity:0;transition:0.3s;z-index:2000;pointer-events:none}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
body{padding:10px}.card{padding:12px}
.fr input,.fr select{min-width:100%}
.tbl th,.tbl td{padding:6px 3px;font-size:12px}
.ac{font-size:11px;padding:3px 8px}
}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<h1 style="font-size:20px;margin:0">菜单管理</h1>
<a href="/" class="bk">&larr; 返回点菜</a>
<div style="margin-left:auto;display:flex;align-items:center;gap:6px">
<span style="font-size:12px;color:var(--t3)">{{user.email}}</span>
<button onclick="showPwdModal()" class="ac" style="font-size:11px;padding:4px 10px">&#x1F512; 修改密码</button>
<a href="/logout" class="ac" style="font-size:11px;padding:4px 10px;text-decoration:none;color:var(--t2)">退出</a>
</div>
</div>

<div id="adminContent">

<!-- 统计 -->
<div class="card">
<h2>统计</h2>
<div id="statsPanel"></div>
</div>

<!-- 本周 -->
<div class="card">
<h2>本周已点</h2>
<div id="wk"></div>
</div>

<!-- 添加 -->
<div class="card">
<h2>添加菜品</h2>
<div class="fr"><input id="inpN" placeholder="菜名"><select id="inpC"></select></div>
<div class="fr"><input id="inpI" placeholder="图片链接(可选)"></div>
<div class="fr"><textarea id="inpD" placeholder="描述(可选)"></textarea></div>
<div class="fr"><button onclick="addD()">添加</button></div>
</div>

<!-- 分类管理 -->
<div class="card">
<h2>分类管理</h2>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px" id="catList"></div>
<div class="fr" style="gap:6px">
<input id="catName" placeholder="新分类名称" style="flex:2;min-width:80px">
<select id="catIcon" style="flex:1;min-width:60px">
<option value="&#x1F969;">&#x1F969; 荤菜</option>
<option value="&#x1F966;">&#x1F966; 素菜</option>
<option value="&#x1F372;">&#x1F372; 汤</option>
<option value="&#x1F95E;">&#x1F95E; 主食</option>
<option value="&#x1F96C;">&#x1F96C; 凉菜</option>
</select>
<button onclick="addCat()">添加</button>
</div>
</div>

<!-- 菜品管理 -->
<div class="card">
<h2>菜品管理</h2>
<div class="cf" id="cf"></div>
<div style="overflow-x:auto">
<table class="tbl">
<thead><tr><th>名称</th><th>分类</th><th>食材</th><th>状态</th><th>操作</th></tr></thead>
<tbody id="dtb"></tbody>
</table>
</div>
</div>

<!-- 编辑 -->
<div class="card" id="ec" style="display:none;border:2px solid var(--p)">
<h2>编辑 <span id="eid"></span></h2>
<div class="fr"><input id="eN" placeholder="菜名"></div>
<div class="fr"><select id="eC"></select></div>
<div class="fr"><input id="eI" placeholder="图片链接"></div>
<div class="fr"><textarea id="eD" rows="2" placeholder="描述"></textarea></div>
<!-- 食材管理 -->
<div class="fr" style="border-top:1px solid var(--l);padding-top:8px;margin-top:4px">
<span style="font-size:13px;color:var(--t2);font-weight:500">食材：</span>
</div>
<div id="eIngs"></div>
<div class="fr" style="gap:4px">
<input id="eIngN" placeholder="食材名" style="min-width:80px;flex:2">
<input id="eIngQ" placeholder="用量" style="min-width:60px;flex:1">
<button style="font-size:12px;padding:8px 12px" onclick="addIng()">添加食材</button>
</div>
<div class="fr" style="margin-top:6px">
<button onclick="saveEdit()">保存</button>
<button class="sec" onclick="cancelEdit()">取消</button>
</div>
</div>

</div>
</div>

<div class="toast" id="toast"></div>

<style>
.mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px);display:none}
.mw{background:var(--card);border-radius:var(--r);padding:24px;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.mw h3{font-size:16px;font-weight:700;margin-bottom:8px}
</style>
<!-- 修改密码弹窗 -->
<div class="mask" id="pwdMask">
<div class="mw">
<h3>&#x1F512; 修改密码</h3>
<div style="display:flex;flex-direction:column;gap:10px;margin-top:6px">
<input type="password" id="oldPwd" placeholder="当前密码" style="width:100%;padding:10px 12px;border:1.5px solid var(--l);border-radius:var(--rs);font-size:14px;outline:none">
<input type="password" id="newPwd" placeholder="新密码(至少4位)" style="width:100%;padding:10px 12px;border:1.5px solid var(--l);border-radius:var(--rs);font-size:14px;outline:none">
</div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
<button class="sec" onclick="hidePwdModal()" style="background:#eee;border:none;border-radius:var(--rs);padding:8px 22px;cursor:pointer;font-weight:600;color:var(--t2)">取消</button>
<button onclick="chpwd()" style="background:var(--p);color:#fff;border:none;border-radius:var(--rs);padding:8px 22px;cursor:pointer;font-weight:600">保存</button>
</div>
</div>
</div>

<script>
var dishes=[];
var catF='';
var eid=null;
var eIngs=[];

function toast(m){
 var e=document.getElementById('toast');e.textContent=m;e.classList.add('sh');
 clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('sh')},2000);
}

var C=[];
// C is loaded from /api/categories
async function loadAll(){await Promise.all([loadD(),loadW(),loadStats(),loadCats()])}

// 分类管理
var cats=[];
async function loadCats(){
 try{
  var r=await fetch('/api/categories?_t='+Date.now());
  cats=await r.json();
  var el=document.getElementById('catList');
  el.innerHTML=cats.map(function(c){return'<span style="background:var(--bg);padding:3px 10px;border-radius:20px;font-size:13px;display:inline-flex;align-items:center;gap:4px">'+c.icon+' '+c.name+' <span style="cursor:pointer;color:#c44;font-size:11px" onclick="delCat('+c.id+',\''+c.name+'\')">&#10005;</span></span>';}).join('');
 // Populate selects
 document.getElementById('inpC').innerHTML=cats.map(function(c){return'<option value="'+c.name+'">'+c.icon+' '+c.name+'</option>'}).join('');
 document.getElementById('eC').innerHTML=cats.map(function(c){return'<option value="'+c.name+'">'+c.icon+' '+c.name+'</option>'}).join('');
 }catch(e){}
}
async function addCat(){
 var nm=document.getElementById('catName').value.trim();
 if(!nm){toast('输入分类名称');return}
 var ic=document.getElementById('catIcon').value;
 var r=await fetch('/api/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,icon:ic})});
 if(!r.ok){var d=await r.json();toast(d.error||'添加失败');return}
 document.getElementById('catName').value='';
 toast('已添加');loadCats();
}
async function delCat(id,name){
 if(!confirm('确定删除分类「'+name+'」？'))return;
 var r=await fetch('/api/categories/'+id,{method:'DELETE'});
 if(!r.ok){var d=await r.json();toast(d.error||'删除失败');return}
 toast('已删除');loadCats();
}

// 统计
async function loadStats(){
 try{
  var r=await fetch('/api/stats?_t='+Date.now());
  var d=await r.json();
  var el=document.getElementById('statsPanel');
  var h='<div style="font-size:13px;color:var(--t2);margin-bottom:8px">累计下单 <b style="color:var(--p)">'+d.total_orders+'</b> 次</div>';
  if(d.top_dishes.length){
   h+='<div style="display:flex;flex-wrap:wrap;gap:4px">';
   d.top_dishes.slice(0,8).forEach(function(di,i){
    var m=i==0?'&#129351;':(i==1?'&#129352;':(i==2?'&#129353;':''));
    h+='<span style="background:var(--bg);padding:3px 10px;border-radius:20px;font-size:13px">'+m+' '+di.name+' <span style="color:var(--p);font-weight:600">'+di.count+'</span></span>';
   });
   h+='</div>';
  }

  el.innerHTML=h;
 }catch(e){}
}

// 本周
async function loadW(){
 var r=await fetch('/api/orders/week?_t='+Date.now());var data=await r.json();
 var grp={};data.orders.forEach(function(o){if(!grp[o.order_date])grp[o.order_date]=[];grp[o.order_date].push(o.dish_name)});
 var el=document.getElementById('wk');
 var es=Object.entries(grp);
 el.innerHTML=es.length?'<div style="display:flex;flex-direction:column;gap:8px">'+es.map(function(e){
  return'<div style="font-size:13px"><span style="font-weight:500">'+e[0]+'</span> <span style="color:var(--t3);font-size:11px">('+e[1].length+'道)</span><div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px">'+e[1].map(function(n){return'<span style="background:var(--pl);color:var(--p);padding:2px 10px;border-radius:4px;font-size:12px">'+n+'</span>'}).join('')+'</div></div>';
 }).join('')+'</div>':'<p style="color:var(--t3);font-size:13px">暂无</p>';
}

// 分类筛选
function renderCats(){
 var el=document.getElementById('cf');
 var names=cats.map(function(c){return c.name});
 el.innerHTML=['全部'].concat(names).map(function(c){
  var on=c===catF||(!catF&&c==='全部')?'on':'';
  // Find icon if available
  var ic='';
  if(c!=='全部'){var found=cats.find(function(cat){return cat.name===c});if(found)ic=found.icon+' ';}
  return'<span class="fi '+on+'" onclick="setCat(\''+c+'\')">'+ic+c+'</span>';
 }).join('');
}
function setCat(c){catF=c==='全部'?'':c;renderCats();renderT()}

// 菜品
async function loadD(){
 var r=await fetch('/api/dishes/all');
 if(!r.ok){return}
 dishes=await r.json();
 renderCats();renderT();
}

function renderT(){
 var el=document.getElementById('dtb');
 var flt=catF?dishes.filter(function(d){return d.category===catF}):dishes;
 el.innerHTML=flt.map(function(d){
  var st=d.available?'<span class="on">在售</span>':'<span class="off">下架</span>';
  return'<tr><td>'+d.name+'</td><td><span class="tag">'+d.category+'</span></td><td style="max-width:120px"><span class="ing-list" id="ings-'+d.id+'"></span><span style="color:var(--t3);font-size:11px">...</span></td><td>'+st+'</td><td><button class="ac" onclick="editD('+d.id+')">编辑</button><button class="ac" onclick="toggleA('+d.id+','+(!d.available)+')">'+(d.available?'下架':'上架')+'</button><button class="ac del" onclick="delD('+d.id+')">删除</button></td></tr>';
 }).join('');
 // 异步加载食材摘要
 flt.forEach(function(d){
  if(d.available)loadIngSum(d.id);
 });
}

async function loadIngSum(did){
 try{
  var r=await fetch('/api/dishes/'+did+'/ingredients?_t='+Date.now());
  var ings=await r.json();
  var el=document.getElementById('ings-'+did);
  if(!el)return;
  if(ings.length){
   el.innerHTML=ings.map(function(i){return'<span class="it">'+i.name+' '+i.quantity+'</span>'}).join('');
   el.parentElement.querySelector('span:last-child').style.display='none';
  }
 }catch(e){}
}

// 编辑
var editIngs=[];var editingDishId=null;

function editD(id){
 var d=dishes.find(function(di){return di.id===id});
 if(!d)return;
 eid=id;editingDishId=id;
 document.getElementById('eid').textContent='#'+id+' '+d.name;
 // Populate category select
 var ec=document.getElementById('eC');
 ec.innerHTML=cats.map(function(c){return'<option value="'+c.name+'">'+c.icon+' '+c.name+'</option>'}).join('');
 ec.value=d.category;
 document.getElementById('eN').value=d.name;
 document.getElementById('eC').value=d.category;
 document.getElementById('eI').value=d.image_url||'';
 document.getElementById('eD').value=d.description||'';
 // 加载食材
 loadEditIngs(id);
 document.getElementById('ec').style.display='block';
 document.getElementById('ec').scrollIntoView({behavior:'smooth',block:'center'});
}

async function loadEditIngs(did){
 try{
  var r=await fetch('/api/dishes/'+did+'/ingredients?_t='+Date.now());
  editIngs=await r.json();
 }catch(e){editIngs=[]}
 renderEditIngs();
}

function renderEditIngs(){
 var el=document.getElementById('eIngs');
 if(!editIngs.length){el.innerHTML='<p style="color:var(--t3);font-size:12px">暂无食材</p>';return}
 el.innerHTML=editIngs.map(function(i){
  return'<span class="it" style="background:var(--pl);padding:4px 10px;border-radius:4px;font-size:13px;display:inline-block;margin:2px">'+i.name+' '+i.quantity+' <span class="rm" onclick="delIng('+i.id+')">&#10005;</span></span>';
 }).join('');
}

async function addIng(){
 if(!editingDishId)return;
 var nm=document.getElementById('eIngN').value.trim();
 var qty=document.getElementById('eIngQ').value.trim();
 if(!nm){toast('输入食材名');return}
 var r=await fetch('/api/dishes/'+editingDishId+'/ingredients',{method:'POST',headers:hdr(),body:JSON.stringify({name:nm,quantity:qty})});
 if(!r.ok){return}
 var data=await r.json();
 if(data.ok){
  document.getElementById('eIngN').value='';
  document.getElementById('eIngQ').value='';
  await loadEditIngs(editingDishId);
  toast('已添加');
 }
}

async function delIng(iid){
 var r=await fetch('/api/ingredients/'+iid,{method:'DELETE'});
 if(r.ok){await loadEditIngs(editingDishId);toast('已删除')}
}

async function saveEdit(){
 var data={name:document.getElementById('eN').value.trim(),category:document.getElementById('eC').value,
           image_url:document.getElementById('eI').value.trim(),description:document.getElementById('eD').value.trim()};
 if(!data.name){toast('填写菜名');return}
 var r=await fetch('/api/dishes/'+eid,{method:'PUT',headers:hdr(),body:JSON.stringify(data)});
 if(!r.ok){return}
 toast('已保存');cancelEdit();loadD();
}
function cancelEdit(){eid=null;editingDishId=null;document.getElementById('ec').style.display='none'}

async function toggleA(id,avail){
 var r=await fetch('/api/dishes/'+id,{method:'PUT',headers:hdr(),body:JSON.stringify({available:avail})});
 if(!r.ok){return}
 toast(avail?'已上架':'已下架');loadD();
}
async function delD(id){
 if(!confirm('确定删除？'))return;
 var r=await fetch('/api/dishes/'+id,{method:'DELETE'});
 if(!r.ok){return}
 toast('已删除');loadAll();
}

async function addD(){
 var nm=document.getElementById('inpN').value.trim();
 if(!nm){toast('填写菜名');return}
 var r=await fetch('/api/dishes',{method:'POST',headers:hdr(),body:JSON.stringify({name:nm,category:document.getElementById('inpC').value,image_url:document.getElementById('inpI').value.trim(),description:document.getElementById('inpD').value.trim()})});
 if(!r.ok){return}
 toast('添加成功');
 document.getElementById('inpN').value='';document.getElementById('inpI').value='';document.getElementById('inpD').value='';
 loadD();
}

function showPwdModal(){document.getElementById('pwdMask').style.display='flex'}
function hidePwdModal(){document.getElementById('pwdMask').style.display='none'}
document.getElementById('pwdMask').addEventListener('click',function(e){if(e.target===this)hidePwdModal()});

async function chpwd(){
 var old=document.getElementById('oldPwd').value;
 var pwd=document.getElementById('newPwd').value.trim();
 if(pwd.length<4){toast('新密码至少4位');return}
 var r=await fetch('/api/settings/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:old,new_password:pwd})});
 var d=await r.json();
 if(d.ok){document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';hidePwdModal();toast('密码已更新');}
 else{toast(d.error||'修改失败');}
}

loadAll();
</script>
</div>
</div>




<div class="toast" id="toast"></div>

</div>

</body>
</html>
